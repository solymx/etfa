# =============================================================================
# ETF 主配置檔
# =============================================================================
# 想新增一檔 ETF？只要在這裡加一段配置，main.py 就能跑起來。
# 想關掉某檔暫停更新？把 enabled 改成 false。
#
# 欄位說明：
#   code:      ETF 證券代號（顯示用，例如 "00980A"）
#   name:      中文簡稱（報表標題用）
#   issuer:    發行投信（用來分類和 index 首頁分組）
#   category:  taiwan_stock / foreign_stock / bond
#   fetcher:   用哪個 fetcher 模組抓資料（對應 core/fetchers/ 下的檔名）
#   params:    傳給 fetcher 的參數（每家投信的 API 參數不同）
#   enabled:   是否啟用（false 會被 main.py 跳過）
#   track_changelog: （選用）設 true 會累積異動日誌到 data/<CODE>_changelog.csv
#                    用於長期追蹤經理人操作風格
# =============================================================================

etfs:
  # ========== 野村投信（nomurafunds.com.tw API）==========
  - code: "00980A"
    name: "野村臺灣智慧優選"
    issuer: "野村投信"
    category: "taiwan_stock"
    fetcher: "nomura"
    params:
      fund_id: "00980A"
    enabled: true

  - code: "00985A"
    name: "野村台灣增強50"
    issuer: "野村投信"
    category: "taiwan_stock"
