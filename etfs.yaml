    params:
      fund_id: "00999A"
    enabled: false  # Phase 2 啟用

  # ========== 統一投信（ezmoney.com.tw 爬蟲）==========
  - code: "00981A"
    name: "統一台股增長"
    issuer: "統一投信"
    category: "taiwan_stock"
    fetcher: "ezmoney"
    params:
      fund_code: "49YTW"   # ezmoney 的內部代號，需實際確認
    enabled: true
    track_changelog: true  # 累積異動日誌到 data/00981A_changelog.csv

  - code: "00403A"
    name: "統一台股升級50"
    issuer: "統一投信"
    category: "taiwan_stock"
    fetcher: "ezmoney"
    params:
      fund_code: ""        # Phase 2 填入
    enabled: false

  # ========== 群益投信（capitalfund.com.tw API）==========
