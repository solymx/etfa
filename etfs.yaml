# =============================================================================
# 全域設定
# =============================================================================
settings:
  data_dir: "data"
  reports_dir: "reports"
  backup_dir_suffix: "_backup"   # 備份資料夾後綴，例：00980A_backup/
  trend_window_days: 10          # 分析器的預設對比窗格

